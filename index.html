<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인간 이해 완전 가이드 — MBTI 상담 매뉴얼</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e;
    --surface: #111115;
    --card: #17171d;
    --card2: #1d1d25;
    --border: #252532;
    --border2: #2e2e3e;
    --accent1: #c8a96e;
    --accent2: #7b9ea8;
    --accent3: #a87b9e;
    --text: #eae6de;
    --text2: #b8b4aa;
    --muted: #777788;
    --NT: #4a7fa5;
    --NF: #7a5f9e;
    --ST: #4a8f6a;
    --SF: #9e6a4a;
    --red: #c97060;
    --green: #6aaf8a;
    --blue: #6090c0;
    --purple: #9070c0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* ── HEADER ── */
  header {
    padding: 70px 40px 50px;
    text-align: center;
    position: relative;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  header::before {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(200,169,110,0.1) 0%, transparent 65%);
    pointer-events:none;
  }
  .header-eyebrow {
    font-size:10px; letter-spacing:5px; text-transform:uppercase;
    color:var(--accent1); margin-bottom:18px;
  }
  header h1 {
    font-family:'Noto Serif KR',serif; font-weight:300;
    font-size:clamp(26px,5vw,54px); line-height:1.25;
    color:var(--text); margin-bottom:18px;
  }
  header h1 em { font-style:italic; color:var(--accent1); }
  .header-desc {
    font-size:14px; color:var(--muted); max-width:520px; margin:0 auto; line-height:1.8;
  }
  .header-tags {
    display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:22px;
  }
  .header-tag {
    font-size:11px; padding:5px 14px; border-radius:20px;
    border:1px solid var(--border2); color:var(--muted); background:rgba(255,255,255,0.02);
  }

  /* ── LEGEND ── */
  .legend {
    display:flex; justify-content:center; gap:28px; flex-wrap:wrap;
    padding:18px 40px; border-bottom:1px solid var(--border);
    background: rgba(255,255,255,0.01);
  }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); }
  .legend-dot { width:9px; height:9px; border-radius:50%; }

  /* ── GRID ── */
  .grid-wrap { max-width:940px; margin:50px auto; padding:0 28px; }
  .grid-title {
    font-size:11px; letter-spacing:4px; text-transform:uppercase;
    color:var(--muted); text-align:center; margin-bottom:28px;
  }
  .mbti-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .mbti-card {
    position:relative; background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:22px 16px 18px; cursor:pointer;
    transition:all .3s cubic-bezier(.16,1,.3,1); text-align:center; overflow:hidden;
  }
  .mbti-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    border-radius:14px 14px 0 0; opacity:.7; transition:opacity .3s, height .3s;
  }
  .mbti-card.NT::before { background:var(--NT); }
  .mbti-card.NF::before { background:var(--NF); }
  .mbti-card.ST::before { background:var(--ST); }
  .mbti-card.SF::before { background:var(--SF); }
  .mbti-card:hover { transform:translateY(-5px); border-color:rgba(200,169,110,.35); box-shadow:0 24px 48px rgba(0,0,0,.45); }
  .mbti-card:hover::before { opacity:1; height:4px; }
  .mbti-code { font-family:'DM Serif Display',serif; font-size:23px; letter-spacing:2px; margin-bottom:5px; transition:color .3s; }
  .mbti-card.NT .mbti-code { color:#7ab5d8; }
  .mbti-card.NF .mbti-code { color:#b09acf; }
  .mbti-card.ST .mbti-code { color:#7abf9a; }
  .mbti-card.SF .mbti-code { color:#cf9a7a; }
  .mbti-nickname { font-size:11px; color:var(--muted); }
  .mbti-enneagram { font-size:10px; color:var(--border2); margin-top:5px; }

  /* ── MODAL ── */
  .overlay {
    position:fixed; inset:0; background:rgba(4,4,8,.9); backdrop-filter:blur(12px);
    z-index:200; display:flex; align-items:flex-start; justify-content:center;
    padding:20px; overflow-y:auto;
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .overlay.active { opacity:1; pointer-events:all; }
  .modal {
    background:var(--surface); border:1px solid var(--border2);
    border-radius:22px; width:100%; max-width:820px; position:relative;
    margin:auto;
    transform:translateY(24px) scale(.97); transition:transform .38s cubic-bezier(.16,1,.3,1);
  }
  .overlay.active .modal { transform:translateY(0) scale(1); }
  .modal::-webkit-scrollbar { width:4px; }
  .modal::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }

  /* Modal Header */
  .modal-header {
    padding:38px 38px 26px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--surface); z-index:10;
    border-radius:22px 22px 0 0;
  }
  .close-btn {
    position:absolute; top:22px; right:22px; width:36px; height:36px;
    border-radius:50%; border:1px solid var(--border); background:transparent;
    color:var(--muted); cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; transition:all .2s;
  }
  .close-btn:hover { border-color:var(--accent1); color:var(--accent1); }
  .modal-badge { font-size:10px; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; }
  .modal-title { font-family:'DM Serif Display',serif; font-size:46px; letter-spacing:4px; margin-bottom:5px; }
  .modal-sub { font-size:15px; color:var(--muted); font-family:'Noto Serif KR',serif; font-style:italic; }

  /* Tab Nav */
  .tab-nav {
    display:flex; gap:4px; padding:16px 38px 0; overflow-x:auto;
    border-bottom:1px solid var(--border);
  }
  .tab-nav::-webkit-scrollbar { display:none; }
  .tab-btn {
    flex-shrink:0; padding:10px 18px; font-size:12px; letter-spacing:1px;
    border-radius:10px 10px 0 0; border:none; background:transparent;
    color:var(--muted); cursor:pointer; transition:all .2s; font-family:'Noto Sans KR',sans-serif;
    border:1px solid transparent; border-bottom:none;
  }
  .tab-btn.active { background:var(--card); color:var(--text); border-color:var(--border); }
  .tab-btn:hover:not(.active) { color:var(--text2); }

  /* Tab Content */
  .tab-content { display:none; padding:30px 38px 38px; }
  .tab-content.active { display:block; }

  /* Sections */
  .section {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:22px 24px; margin-bottom:16px;
  }
  .section:last-child { margin-bottom:0; }
  .section-label {
    font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--accent1);
    margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .section-text { font-size:14px; line-height:1.9; color:var(--text2); }

  /* Tags */
  .tag-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
  .tag { font-size:12px; padding:5px 13px; border-radius:20px; border:1px solid; }
  .tag.green { border-color:rgba(106,175,138,.4); color:#6aaf8a; background:rgba(106,175,138,.06); }
  .tag.red { border-color:rgba(201,112,96,.4); color:#c97060; background:rgba(201,112,96,.06); }
  .tag.blue { border-color:rgba(96,144,192,.4); color:#6090c0; background:rgba(96,144,192,.06); }
  .tag.gold { border-color:rgba(200,169,110,.4); color:var(--accent1); background:rgba(200,169,110,.06); }
  .tag.purple { border-color:rgba(144,112,192,.4); color:#9070c0; background:rgba(144,112,192,.06); }

  /* Enneagram */
  .ennea-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .ennea-badge {
    width:46px; height:46px; border-radius:50%; border:2px solid var(--accent2);
    display:flex; align-items:center; justify-content:center;
    font-family:'DM Serif Display',serif; font-size:20px; color:var(--accent2);
    background:rgba(123,158,168,.08);
  }

  /* Two col */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
  .mini-card {
    background:var(--card2); border:1px solid var(--border);
    border-radius:12px; padding:16px 18px;
  }
  .mini-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--accent1); margin-bottom:10px; }

  /* Tip list */
  .tip-list { list-style:none; display:grid; gap:10px; }
  .tip-list li {
    font-size:13.5px; line-height:1.8; color:var(--text2);
    padding-left:20px; position:relative;
  }
  .tip-list li::before { content:'›'; position:absolute; left:0; color:var(--accent1); font-size:17px; line-height:1.5; }
  .tip-list li strong { color:var(--text); }

  /* Detect clue */
  .clue-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .clue-card {
    background:var(--card2); border:1px solid var(--border);
    border-radius:12px; padding:16px 18px;
  }
  .clue-icon { font-size:18px; margin-bottom:8px; }
  .clue-title { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--accent2); margin-bottom:6px; }
  .clue-body { font-size:13px; line-height:1.75; color:var(--text2); }

  /* Dialog examples */
  .dialog-item {
    background:var(--card2); border:1px solid var(--border);
    border-radius:14px; padding:20px; margin-bottom:12px;
  }
  .dialog-item:last-child { margin-bottom:0; }
  .dialog-situation {
    font-size:12px; font-weight:600; color:var(--text);
    margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px;
  }
  .dialog-pair { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .dialog-bubble { border-radius:12px; padding:14px 16px; }
  .dialog-bubble.bad { background:rgba(201,112,96,.07); border:1px solid rgba(201,112,96,.25); }
  .dialog-bubble.good { background:rgba(106,175,138,.07); border:1px solid rgba(106,175,138,.25); }
  .dialog-head { font-size:10px; letter-spacing:2px; text-transform:uppercase; font-weight:700; margin-bottom:8px; }
  .dialog-bubble.bad .dialog-head { color:var(--red); }
  .dialog-bubble.good .dialog-head { color:var(--green); }
  .dialog-quote {
    font-size:14px; line-height:1.7; color:var(--text);
    font-style:italic; margin-bottom:10px;
    padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,.05);
  }
  .dialog-reason { font-size:12px; line-height:1.7; color:var(--muted); }

  /* Alert box */
  .alert-box {
    border-radius:12px; padding:16px 20px; margin-bottom:16px;
    border-left:3px solid;
  }
  .alert-box.warn { border-color:var(--accent1); background:rgba(200,169,110,.06); }
  .alert-box.danger { border-color:var(--red); background:rgba(201,112,96,.06); }
  .alert-box.info { border-color:var(--blue); background:rgba(96,144,192,.06); }
  .alert-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; font-weight:600; }
  .alert-box.warn .alert-title { color:var(--accent1); }
  .alert-box.danger .alert-title { color:var(--red); }
  .alert-box.info .alert-title { color:var(--blue); }
  .alert-body { font-size:13px; line-height:1.8; color:var(--text2); }

  /* Stage list */
  .stage-list { display:grid; gap:10px; }
  .stage-item {
    display:flex; gap:14px; align-items:flex-start;
    background:var(--card2); border:1px solid var(--border);
    border-radius:12px; padding:14px 16px;
  }
  .stage-num {
    flex-shrink:0; width:28px; height:28px; border-radius:50%;
    background:var(--card); border:1px solid var(--border2);
    display:flex; align-items:center; justify-content:center;
    font-family:'DM Serif Display',serif; font-size:14px; color:var(--accent1);
  }
  .stage-body { font-size:13.5px; line-height:1.8; color:var(--text2); }
  .stage-body strong { color:var(--text); display:block; margin-bottom:3px; font-size:14px; }

  /* Responsive */
  @media(max-width:640px){
    .mbti-grid { grid-template-columns:repeat(2,1fr); }
    .tab-content { padding:20px; }
    .modal-header { padding:24px 20px 18px; }
    .tab-nav { padding:12px 20px 0; }
    .modal-title { font-size:34px; }
    .two-col, .clue-grid, .dialog-pair { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Human Understanding Complete Guide</div>
  <h1>사람을 이해하는<br><em>MBTI 완전 가이드</em></h1>
  <p class="header-desc">처음 만난 사람도, 오래 알았던 사람도<br>어떻게 이해하고 어떻게 말해야 하는지 — 처음부터 끝까지</p>
  <div class="header-tags">
    <span class="header-tag">16가지 유형</span>
    <span class="header-tag">유형 파악법</span>
    <span class="header-tag">애니어그램 연계</span>
    <span class="header-tag">실전 대화 예시</span>
    <span class="header-tag">상담 전략</span>
    <span class="header-tag">주의사항</span>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--NT)"></div>NT — 분석가형 (직관+사고)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--NF)"></div>NF — 외교관형 (직관+감정)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--ST)"></div>ST — 관리자형 (감각+사고)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--SF)"></div>SF — 탐험가형 (감각+감정)</div>
</div>

<div class="grid-wrap">
  <div class="grid-title">유형을 클릭하면 완전 가이드가 열립니다</div>
  <div class="mbti-grid" id="mbtiGrid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <button class="close-btn" onclick="closeModal()">✕</button>
      <div class="modal-badge" id="mBadge"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-sub" id="mSub"></div>
    </div>
    <div class="tab-nav" id="tabNav"></div>
    <div id="tabContents"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════
const DATA = {
  INTJ: {
    type:"NT", nickname:"전략가",
    typeLabel:"분석가형 — NT",
    tagline:"\"비효율을 참지 못하는 전략가\"",
    desc:`혼자 있어도 전혀 외롭지 않은 유형. 머릿속에서 항상 '어떻게 하면 더 효율적일까'를 생각한다. 감정보다 논리가 우선이고, 근거 없는 말을 들으면 즉각 반박하고 싶어진다. 겉으로는 차갑게 보이지만 내면엔 매우 강한 가치관이 있다. 가까운 소수의 관계를 깊이 유지하는 걸 선호하고, 신뢰를 쌓는 데 오래 걸리지만 한 번 쌓이면 매우 견고하다.`,
    enneagram:["5","1","3"],
    enneagramNote:`<strong>5번(탐구자)</strong>이 가장 흔함 — 정보 수집과 지식으로 세상을 이해하려 함. <strong>1번(완벽주의자)</strong>은 높은 기준과 원칙으로 드러남. <strong>3번(성취자)</strong>은 목표 달성 욕구가 강할 때 나타남.`,
    likeWords:["논리적으로 맞네요","당신의 분석이 정확해요","효율적인 방법이에요","핵심을 바로 짚었어요","독립적으로 판단하면 돼요","설명 안 해도 이해해요"],
    dislikeWords:["느낌이 중요하잖아요","다들 그렇게 해요","한번만 봐줘요","그냥 해봐요","왜 그렇게 차갑게 대해요","감정을 좀 표현해봐요"],
    detect:{
      speech:["말이 짧고 단호함. 결론을 먼저 말하는 경향","질문을 받으면 잠시 생각하다가 정확하게 대답","잡담보다 주제 있는 대화를 선호","'그건 왜요?' '근거가 뭐예요?' 같은 질문을 자주 함"],
      behavior:["약속 시간을 칼같이 지킴. 어길 경우 매우 불편해함","집이나 책상이 체계적으로 정리되어 있음","새로운 사람과 친해지는 데 시간이 오래 걸림","혼자 있는 시간을 적극적으로 추구함"],
      reaction:["칭찬해도 무덤덤하거나 '왜 그렇게 생각해요?'라고 반문","갑작스러운 계획 변경에 당황하거나 불편해함","감정적으로 호소하면 거리를 둠","논리적 오류를 발견하면 참지 못하고 지적함"],
      story:"처음 만났을 때 말이 별로 없어도 눈빛이 날카롭고 생각을 많이 하는 것 같다면, 대화를 시도해봤을 때 핵심만 간결하게 말하고 감정 표현이 적다면 INTJ일 가능성이 높습니다."
    },
    approach:[
      {title:"핵심부터 말하기", body:"서론이 길면 집중력이 빠르게 떨어집니다. '이번 주제는 3가지인데요—'처럼 구조를 먼저 제시하면 훨씬 잘 들어요."},
      {title:"논리와 근거를 항상 함께", body:"'제 생각엔~' 같은 주관적 표현보다 '이 데이터를 보면~', '이 패턴이 반복됐는데~' 처럼 근거를 함께 제시하세요."},
      {title:"결정권을 주기", body:"'어떻게 하면 좋을까요?' 보다 '두 가지 옵션이 있어요, 어떤 게 나을 것 같아요?'처럼 선택지를 주면 훨씬 편하게 반응합니다."},
      {title:"침묵을 불편해하지 않기", body:"생각할 때 말이 없어집니다. 이 침묵을 채우려 하지 마세요. 기다리면 훨씬 좋은 답이 나옵니다."},
      {title:"아첨이나 빈말 피하기", body:"'정말 대단해요!'보다 '이 부분이 특히 정확했어요'처럼 구체적인 인정이 훨씬 잘 통합니다."},
    ],

// ══════════════════════════════════════════════════════
// GRID RENDER
// ══════════════════════════════════════════════════════
const ORDER = ["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];
const TC = { NT:{c:'#7ab5d8'}, NF:{c:'#b09acf'}, ST:{c:'#7abf9a'}, SF:{c:'#cf9a7a'} };

const grid = document.getElementById('mbtiGrid');
ORDER.forEach(code => {
  const d = DATA[code];
  const el = document.createElement('div');
  el.className = `mbti-card ${d.type}`;
  el.innerHTML = `<div class="mbti-code">${code}</div><div class="mbti-nickname">${d.nickname}</div>`;
  el.onclick = () => openModal(code);
  grid.appendChild(el);
});

// ══════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════
let currentTab = 0;

function openModal(code) {
  const d = DATA[code];
  const tc = TC[d.type];

  document.getElementById('mBadge').textContent = d.typeLabel;
  document.getElementById('mBadge').style.color = tc.c;
  document.getElementById('mTitle').textContent = code;
  document.getElementById('mTitle').style.color = tc.c;
  document.getElementById('mSub').textContent = `"${d.nickname}" — ${d.tagline}`;

  const tabs = ['개요 & 성격','유형 파악법','대화 전략','상담 가이드','실전 대화 예시'];
  const nav = document.getElementById('tabNav');
  nav.innerHTML = tabs.map((t,i) => `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${i})">${t}</button>`).join('');

  const contents = document.getElementById('tabContents');
  contents.innerHTML = '';
  contents.appendChild(buildTab0(d));
  contents.appendChild(buildTab1(d));
  contents.appendChild(buildTab2(d));
  contents.appendChild(buildTab3(d));
  contents.appendChild(buildTab4(d));

  currentTab = 0;
  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function switchTab(i) {
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
  document.querySelectorAll('.tab-content').forEach((c,j)=>c.classList.toggle('active',i===j));
  currentTab = i;
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('overlay').addEventListener('click', e => { if(e.target===document.getElementById('overlay')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── TAB BUILDERS ──────────────────────────────────────

    </div>
    <div class="two-col">
